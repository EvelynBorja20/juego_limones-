<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utilis.js"></script>
</head>

<body onload="iniciar();">

  <div class="contenedor">
    
    <header>
      <h1>🍋 Atrapar Limones</h1>
      <p class="frase">"Si del cielo te caen limones... ¡atrápalos!"</p>
      <h2>Autor: Evelyn Borja</h2>
    </header>

    <main>
      <canvas id="areaJuego" width="600" height="400"></canvas>

      <div class="panel">
        <div class="card">
          <span>Puntaje</span>
          <strong id="txtPuntaje">0</strong>
        </div>

        <div class="card">
          <span>Vidas</span>
          <strong id="txtVidas">3</strong>
        </div>
      </div>

      <div class="botones">
  <button onclick="moverIzquierda();">
    <span class="icono">⬅</span> Izquierda
  </button>

  <button onclick="moverDerecha();">
    <span class="icono">➡</span> Derecha
  </button>

  <button onclick="reiniciarJuego();">
    <span class="icono">🔄</span> Reiniciar
  </button>
</div>
    </main>

  </div>

  <script src="limones.js"></script>
</body>
</html>
